<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>News</title>

<style>
body {
  background: #111;
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  overflow: hidden;
  font-family: sans-serif;
}

h1 {
  color: #00ff00;
  text-align:center;
  font-size:4.5rem;
  font-family: 'Courier New', Courier, monospace;
  margin-top:40px;
  background-color: #000;
  padding: 10px;
}

.container {
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:100px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 360px);
  grid-gap: 40px;
  margin-top: 60px;
}

.tile {
  background: #222;
  width: 360px;
  height: 200px;
  border-radius: 25px;
  text-align: center;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: transform 0.2s, box-shadow 0.2s;
}

.tile:hover, .tile:focus {
  transform: scale(1.1);
  box-shadow: 0 0 20px #fff;
}

.tile img {
  max-width: 120px;
  margin-bottom: 15px;
}

.tile span {
  color: #00ff00;
  font-size: 2rem;
}

.danger {
  background: #a00;
}

.title {
  text-align: center;
  margin-top: 40px;
  margin-bottom: 40px;
}

.title img {
  width: auto;
  max-width: 60vw;
  max-height: 18vh;
  height: auto;
}

</style>
</head>

<script>
function openKiosk(url) {
  window.location.href = url;
}
</script>

<body>

<h1>News</h1>

<div class="grid">
  <div class="tile" onclick="openKiosk('https://abcnews.go.com/live/video/special-live-11/')">
    <img src="icons/Telearuba.png">
    <span>ABC News</span>
  </div>

  <div class="tile" onclick="openKiosk('https://www.cbsnews.com/live/')">
    <img src="icons/Telearuba.png">
    <span>CBS News</span>
  </div>

  <div class="tile" onclick="openKiosk('https://w3.mp.lura.live/player/prod/v3/anvload.html?key=eyJtIjoiRVBGT1giLCJ2IjoiYWRzdHczZzBQajI4UDJBVyIsInRva2VuIjoiZXlKMGVYQWlPaUpLVjFRaUxDSmhiR2NpT2lKSVV6STFOaUo5LmV5SjJhV1FpT2lKaFpITjBkek5uTUZCcU1qaFFNa0ZYSWl3aWFYTnpJam9pTjJJMFYwcHNNelY2WVVoU2QxZDZhR3RWWlhkWFdrcHBSRE5LVDIxQmFrY2lmUS5LX2dSNHFPSE1OcUhCRUNMTkU2eHdLZEw5aGF4eFJ2NzA2NENJUFlPYTc4IiwiYW52YWNrIjoiN2I0V0psMzV6YUhSd1d6aGtVZXdXWkppRDNKT21BakcifQ%3D%3D')">
    <img src="icons/Telearuba.png">
    <span>Fox News</span>
  </div>

  <div class="tile" onclick="openKiosk('https://www.nbcnews.com/watch')">
    <img src="icons/Telearuba.png">
    <span>NBC News</span>
  </div>

  <div class="tile" onclick="history.back()">
    <span>Back</span>
  </div>
</div>

</body>
</html>
