<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TV Dashboard</title>
<style>
body {
  background: #111;
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  overflow: hidden;
  font-family: sans-serif;
}

h1 {
  color: #00ff00;
  text-align:center;
  font-size:4.5rem;
  font-family: 'Courier New', Courier, monospace;
  margin-top:40px;
  background-color: #000;
  padding: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 360px);
  grid-gap: 40px;
  margin-top: 60px;
}
.tile {
  background: #222;
  width: 360px;
  height: 200px;
  border-radius: 25px;
  text-align: center;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: transform 0.2s, box-shadow 0.2s;
}
.tile:hover, .tile:focus {
  transform: scale(1.1);
  box-shadow: 0 0 20px #fff;
}
.tile img {
  max-width: 120px;
  margin-bottom: 15px;
}
.tile span {
  color: #00ff00;
  font-size: 2rem;
}
.danger { 
  background: #a00;
}
.title {
  text-align: center;
  margin-top: 40px;
  margin-bottom: 40px;
}
.title img {
  width: auto;
  max-width: 60vw;  
  max-height: 18vh;
  height: auto;
}
</style>
</head>

<script>
function openKiosk(url) {
  window.location.href = url;
}
</script>

<body>

<!-- <h1>FVDV TV</h1> -->
<div class="title">
  <img src="images/fvdv_tv5.png" alt="FVDV TV">
</div>

<div class="grid">
  <div class="tile" onclick="openKiosk('https://www.nlziet.nl')">
    <img src="https://images.seeklogo.com/logo-png/44/1/nlziet-logo-png_seeklogo-442808.png" alt="NLZIET">
    <span>NLZIET</span>
  </div>
  <div class="tile" onclick="openKiosk('https://www.primevideo.com')">
    <img src="https://images.seeklogo.com/logo-png/37/1/amazon-prime-video-logo-png_seeklogo-370524.png" alt="Amazon Prime">
    <span>Amazon Prime</span>
  </div>
  <div class="tile" onclick="openKiosk('https://www.youtube.com/tv')">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" alt="YouTube">
    <span>YouTube</span>
  </div>
  <div class="tile" onclick="openKiosk('http://homeassistant.local:8123')">
    <img src="https://images.seeklogo.com/logo-png/50/1/new-home-assistant-logo-png_seeklogo-507274.png" alt="Home Assistant">
    <span>Home Assistant</span>
  </div>
  <div class="tile" onclick="openKiosk('http://localhost:8080/kodi')">
    <img src="https://images.seeklogo.com/logo-png/27/1/kodi-logo-png_seeklogo-275726.png" alt="Kodi">
    <span>Kodi</span>
  </div>
  <div class="tile" onclick="openKiosk('file:///home/Commodore/My_TV/system.html')">
    <img src="icons/commodore_system.png">
    <span>System</span>
  </div>
  <div class="tile" onclick="alert('More apps will be added later 🙂')">
    <img src="icons/labubu-chill-logo.png" alt="More">
    <span>More Apps</span>
  </div>
</div>

</body>
</html>
