<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TV Dashboard</title>
<style>
body {
  background: #111;
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  overflow: hidden;
  font-family: sans-serif;
}

h1 {
  color: #00ff00;
  text-align:center;
  font-size:4.5rem;
  font-family: 'Courier New', Courier, monospace;
  margin-top:40px;
  background-color: #000;
  padding: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 360px);
  grid-gap: 40px;
  margin-top: 60px;
}
.tile {
  background: #222;
  width: 360px;
  height: 200px;
  border-radius: 25px;
  text-align: center;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: transform 0.2s, box-shadow 0.2s;
}
.tile:hover, .tile:focus {
  transform: scale(1.1);
  box-shadow: 0 0 20px #fff;
}
.tile:hover:not(:focus) {
  transform: scale(1.05);
}
.tile img {
  max-width: 120px;
  margin-bottom: 15px;
}
.tile span {
  color: #00ff00;
  font-size: 2rem;
}
.danger { 
  background: #a00;
}
.title {
  text-align: center;
  margin-top: 40px;
  margin-bottom: 40px;
}
.title img {
  width: auto;
  max-width: 60vw;  
  max-height: 18vh;
  height: auto;
}
</style>
</head>

<script>
function openKiosk(url) {
  window.location.href = url;
}
</script>

<script>
function playBeep() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = 'triangle';      // retro feel
  osc.frequency.value = 1000; // pitch (Hz)

  gain.gain.value = 0.05;   // volume (very important!)

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 0.05); // 50 ms beep
}

function playClick() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = 'square';      // retro feel
  osc.frequency.value = 800; // pitch (Hz)

  gain.gain.value = 0.02;   // volume (very important!)

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 0.15); // 150 ms beep
}

document.addEventListener('DOMContentLoaded', () => {
  const tiles = Array.from(document.querySelectorAll('.tile'));
  let index = 0;

  if (tiles.length === 0) return;

  tiles[index].focus();
  playBeep();

  document.addEventListener('keydown', (e) => {
    const cols = 4; 

    switch (e.key) {
      case 'ArrowRight':
        index = (index + 1) % tiles.length;
        playBeep();
        break;
      case 'ArrowLeft':
        index = (index - 1 + tiles.length) % tiles.length;
        playBeep();
        break;
      case 'ArrowDown':
        index = Math.min(index + cols, tiles.length - 1);
        playBeep();
        break;
      case 'ArrowUp':
        index = Math.max(index - cols, 0);
        playBeep();
        break;
      case 'Enter':
        tiles[index].click();
        playClick();
        return;
      default:
        return;
    }

    tiles[index].focus();
    e.preventDefault();
  });
});
</script>

<body>
