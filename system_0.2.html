<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>System</title>

<style>
body {
  background: #111;
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  overflow: hidden;
  font-family: sans-serif;
}

h1 {
  color: #00ff00;
  text-align:center;
  font-size:4.5rem;
  font-family: 'Courier New', Courier, monospace;
  margin-top:40px;
  background-color: #000;
  padding: 10px;
}

.container {
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:100px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 360px);
  grid-gap: 40px;
  margin-top: 60px;
}

.tile {
  background: #222;
  width: 360px;
  height: 200px;
  border-radius: 25px;
  text-align: center;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: transform 0.2s, box-shadow 0.2s;
}

.tile:hover, .tile:focus {
  transform: scale(1.1);
  box-shadow: 0 0 20px #fff;
}

.tile img {
  max-width: 120px;
  margin-bottom: 15px;
}

.tile span {
  color: #00ff00;
  font-size: 2rem;
}

.danger {
  background: #a00;
}

.title {
  text-align: center;
  margin-top: 40px;
  margin-bottom: 40px;
}

.title img {
  width: auto;
  max-width: 60vw;
  max-height: 18vh;
  height: auto;
}

</style>
</head>

<script>
function openKiosk(url) {
  window.location.href = url;
}
</script>

<body>

<h1>System</h1>

<div class="grid">
  <div class="tile" onclick="location.href='http://localhost:8080/reset'">
    <span>Reset TV</span>
  </div>

  <div class="tile" onclick="openKiosk('http://localhost:8080/desktop')">
    <img src="icons/exit.gif">
    <span>Exit to desktop</span>
  </div>

  <div class="tile" onclick="location.href='http://localhost:8080/exit'">
    <img src="icons/commodore-logo.png">
    <span>Exit to desktop</span>
  </div>

  <div class="tile" onclick="location.href='http://localhost:8080/suspend'">
    <span>Suspend system</span>
  </div>

  <div class="tile danger" onclick="location.href='http://localhost:8080/reboot'">
    <span>Reboot system</span>
  </div>

  <div class="tile danger" onclick="location.href='http://localhost:8080/shutdown'">
    <span>Shutdown system</span>
  </div>

  <div class="tile" onclick="history.back()">
    Back
  </div>
</div>

</body>
</html>
