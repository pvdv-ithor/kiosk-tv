<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VPN</title>

<link rel="stylesheet" href="style-sub.css">

</head>

<script>
function openKiosk(url) {
  window.location.href = url;
}
</script>

<script src="controller.js" defer></script>

<script src="vpn-status.js"></script>

<body>

<h1>VPN</h1>

<div id="vpnStatus">
  VPN: checking…
</div>

<div class="grid">

  <div class="tile" tabindex="0" onclick="fetch('http://localhost:8080/vpn-us')">
    <script>
    setTimeout(updateVPNStatus, 3000);
    </script>
    <span>VPN US</span>
  </div>

  <div class="tile" tabindex="1" onclick="fetch('http://localhost:8080/vpn-de')">
    <script>
    setTimeout(updateVPNStatus, 3000);
    </script>
    <span>VPN DE</span>
  </div>

  <div class="tile" tabindex="2" onclick="fetch('http://localhost:8080/vpn-uk')">
    <script>
    setTimeout(updateVPNStatus, 3000);
    </script>
    <span>VPN UK</span>
  </div>

  <div class="tile" tabindex="3" onclick="fetch('http://localhost:8080/vpn-za')">
    <script>
    setTimeout(updateVPNStatus, 3000);
    </script>
    <span>VPN ZA</span>
  </div>

  <div class="tile danger" tabindex="3" onclick="fetch('http://localhost:8080/vpn-off')">
    <span>VPN OFF</span>
  </div>

  <div class="tile" tabindex="4" onclick="history.back()">
    <img src="icons/arrow-left-green.png">
    <span>Back</span>
  </div>

</div>

</body>
</html>
