<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TV Dashboard</title>
<style>
body {
  background: #111;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: sans-serif;
}
.button {
  background: #333;
  color: white;
  font-size: 2.4rem;
  padding: 40px 60px;
  margin: 20px;
  border-radius: 25px;
  text-align: center;
  cursor: pointer;
  width: 300px;
  user-select: none;
}
.button:hover {
  background: #555;
}
</style>
</head>
<body>

<div class="button" onclick="location.href='https://www.nlziet.nl'">NLZIET</div>
<div class="button" onclick="location.href='https://www.youtube.com/tv'">YouTube</div>
<div class="button" onclick="alert('Add more links later 🙂')">More Apps Coming...</div>

</body>
</html>
